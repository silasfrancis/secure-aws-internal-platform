# Install WireGuard
- name: Install WireGuard packages
  apt:
    name:
      - wireguard
      - wireguard-tools
    state: present
    update_cache: yes

# Ensure directories
- name: Ensure WireGuard directory exists
  file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Ensure clients directory exists
  file:
    path: /etc/wireguard/clients
    state: directory
    owner: root
    group: root
    mode: '0700'

# Server private key
- name: Generate server private key if missing
  shell: wg genkey > /etc/wireguard/server_private.key
  args:
    creates: /etc/wireguard/server_private.key

# Server public key
- name: Generate server public key if missing
  shell: wg pubkey < /etc/wireguard/server_private.key > /etc/wireguard/server_public.key
  args:
    creates: /etc/wireguard/server_public.key

# Client keys
- name: Generate client keys
  block:
    - name: Generate client private key
      shell: wg genkey > /etc/wireguard/clients/{{ item }}_private.key
      args:
        creates: /etc/wireguard/clients/{{ item }}_private.key
      loop: "{{ clients }}"

    - name: Generate client public key
      shell: wg pubkey < /etc/wireguard/clients/{{ item }}_private.key > /etc/wireguard/clients/{{ item }}_public.key
      args:
        creates: /etc/wireguard/clients/{{ item }}_public.key
      loop: "{{ clients }}"

# IP forwarding
- name: Enable IPv4 forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    state: present
    reload: yes

# register keys for template configuration
- name: Read server private key
  slurp:
    src: /etc/wireguard/server_private.key
  register: server_private_key_raw

- name: Read client public keys
  slurp:
    src: "/etc/wireguard/clients/{{ item }}_public.key"
  loop: "{{ clients }}"
  register: client_public_keys_raw

# WireGuard configuration
- name: Create WireGuard server configuration
  template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: '0600'

# Enable and start WireGuard
- name: Enable and start WireGuard service
  systemd:
    name: wg-quick@wg0
    enabled: true
    state: started

# Optional: Check WireGuard status
- name: Show WireGuard status
  command: wg show wg0
  register: wg_status
  ignore_errors: true

- name: Debug WireGuard status
  debug:
    var: wg_status.stdout